<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ESP32-WebSocket Console</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Helvetica, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .section {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: monospace;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }
        button:active {
            background: #005bb5;
        }
        button.disconnect {
            background: #ff3b30;
        }
        .status {
            padding: 8px;
            background: #e9ecef;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }
        .message-area {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            padding: 8px;
            font-family: monospace;
            font-size: 13px;
        }
        .message {
            padding: 4px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .sent {
            color: #007aff;
        }
        .received {
            color: #34c759;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>ESP32 ClawBot WebSocket Console</h2>

    <!-- Connection settings -->
    <div class="section">
        <label>WebSocket URL</label>
        <input type="text" id="wsUrl" value="ws://clawbot.local:81/ws" placeholder="ws://192.168.x.x:81/ws">
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn" class="disconnect" style="background:#ccc; color:#333;" disabled>Disconnect</button>
    </div>

    <!-- Status display -->
    <div class="status" id="status">Disconnected</div>

    <!-- Command input -->
    <div class="section">
        <label>Send Command</label>
        <input type="text" id="cmdInput" placeholder="e.g., forward / stop / claw_open / speed:128">
        <button id="sendBtn" disabled>Send</button>
    </div>

    <!-- Message window -->
    <div class="section">
        <label>Message Window</label>
        <div id="messageWindow" class="message-area">
            <div class="message">Waiting for connection...</div>
        </div>
    </div>
</div>

<script>
    let ws = null;

    const wsUrlInput = document.getElementById('wsUrl');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const cmdInput = document.getElementById('cmdInput');
    const statusDiv = document.getElementById('status');
    const messageWindow = document.getElementById('messageWindow');

    // Add a message to the window
    function addMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        const time = new Date().toLocaleTimeString();
        msgDiv.textContent = `[${time}] ${text}`;
        messageWindow.appendChild(msgDiv);
        // Auto-scroll to bottom
        messageWindow.scrollTop = messageWindow.scrollHeight;
    }

    // Optional: keep last 200 messages
    function limitMessages(limit=200) {
        while (messageWindow.children.length > limit) {
            messageWindow.removeChild(messageWindow.firstChild);
        }
    }

    // Update UI based on connection state
    function updateUI(connected) {
        if (connected) {
            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
            disconnectBtn.style.background = '#ff3b30';
            disconnectBtn.style.color = 'white';
            sendBtn.disabled = false;
            statusDiv.textContent = 'Connected';
            statusDiv.style.background = '#d4edda';
            statusDiv.style.color = '#155724';
        } else {
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            disconnectBtn.style.background = '#ccc';
            disconnectBtn.style.color = '#333';
            sendBtn.disabled = true;
            statusDiv.textContent = 'Disconnected';
            statusDiv.style.background = '#f8d7da';
            statusDiv.style.color = '#721c24';
        }
    }

    // Connect to WebSocket
    function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            addMessage('Already connected', 'received');
            return;
        }
        let url = wsUrlInput.value.trim();
        if (!url) {
            alert('Please enter a WebSocket URL');
            return;
        }
        if (!url.startsWith('ws://') && !url.startsWith('wss://')) {
            url = 'ws://' + url;
        }
        try {
            ws = new WebSocket(url);
            ws.onopen = function() {
                addMessage('Connection established', 'received');
                updateUI(true);
            };
            ws.onmessage = function(event) {
                addMessage(`Received: ${event.data}`, 'received');
                limitMessages(200);
            };
            ws.onclose = function() {
                addMessage('Connection closed', 'received');
                updateUI(false);
                ws = null;
            };
            ws.onerror = function(error) {
                addMessage(`Error: ${error.message || 'Connection failed'}`, 'received');
            };
        } catch(e) {
            alert('Failed to create WebSocket connection: ' + e.message);
        }
    }

    // Disconnect
    function disconnect() {
        if (ws) {
            ws.close();
            ws = null;
        }
        updateUI(false);
    }

    // Send command
    function sendCommand() {
        let cmd = cmdInput.value.trim();
        if (!cmd) {
            alert('Please enter a command');
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert('Not connected. Please connect first.');
            return;
        }
        ws.send(cmd);
        addMessage(`Sent: ${cmd}`, 'sent');
        cmdInput.value = '';
        cmdInput.focus();
    }

    // Bind events
    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', disconnect);
    sendBtn.addEventListener('click', sendCommand);

    // Send on Enter key
    cmdInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendCommand();
        }
    });
</script>
</body>
</html>
